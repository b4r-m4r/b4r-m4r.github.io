  <path d="M5 20 Q20 8 40 15 Q60 22 80 12 Q100 5 120 18 Q135 28 145 20" stroke="#f4c542" stroke-width="12" stroke-linecap="round" fill="none" stroke-dasharray="4 20" stroke-dashoffset="10"/>
  <path d="M5 20 Q20 8 40 15 Q60 22 80 12 Q100 5 120 18 Q135 28 145 20" stroke="#2ecc71" stroke-width="12" stroke-linecap="round" fill="none" stroke-dasharray="3 25" stroke-dashoffset="18"/>
